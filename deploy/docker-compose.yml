# Self-hosted KPS ERP stack: MySQL + API (which also serves the frontend).
# Run from this folder:  docker compose up -d --build
# Then open  http://<server-ip>:3001  from any machine on the LAN.
services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kps_erp}
      MYSQL_USER: ${MYSQL_USER:-kps}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kpspass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Expose only if you need direct DB access from the host; not required.
    # ports: ["3306:3306"]

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        # Same-origin: the API serves the frontend, so leave this empty.
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER:-kps}:${MYSQL_PASSWORD:-kpspass}@mysql:3306/${MYSQL_DATABASE:-kps_erp}"
      JWT_SECRET: ${JWT_SECRET:-change-this-access-secret}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change-this-refresh-secret}
      PORT: "3001"
      # Password-reset email links + optional SMTP (blank SMTP_HOST = email off)
      APP_BASE_URL: ${APP_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-KPS ERP <no-reply@kps.local>}
    ports:
      - "${APP_PORT:-3001}:3001"

  # Automated database backups. Writes timestamped .sql dumps to BACKUP_DIR on a
  # schedule and prunes old ones. Set BACKUP_DIR to a cloud-synced folder
  # (OneDrive / Google Drive) for an off-site copy. Runs by default.
  backup:
    image: mysql:8.0
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kps_erp}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
      - ./backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]

  # Remote access from outside the office (HTTPS, no port-forwarding). Only runs
  # when explicitly enabled: docker compose --profile tunnel up -d
  # Requires TUNNEL_TOKEN (Cloudflare Zero Trust → Tunnels) and the tunnel's
  # Public Hostname routed to http://api:3001. See deploy/README.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      - api
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:-}

volumes:
  mysql_data:
